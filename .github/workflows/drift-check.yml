name: Schema drift check

on:
  schedule:
    - cron: '0 14 * * 1'
  pull_request:
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve latest gymbile/wpl tag
        id: tag
        run: |
          latest=$(git ls-remote --tags https://github.com/gymbile/wpl.git \
                  | grep 'refs/tags/v' | grep -v '\^{}' \
                  | sed 's|.*refs/tags/||' | sort -V | tail -1)
          echo "latest=$latest" >> $GITHUB_OUTPUT
      - name: Read vendored version
        id: vendored
        run: echo "version=$(cat priv/schema-version.txt)" >> $GITHUB_OUTPUT
      - name: Diff schema
        run: |
          curl -sSL "https://raw.githubusercontent.com/gymbile/wpl/${{ steps.tag.outputs.latest }}/schema/v1.schema.json" -o /tmp/upstream-schema.json
          if ! diff -q priv/schema/v1.schema.json /tmp/upstream-schema.json > /dev/null; then
            echo "::error::Vendored schema drifted from gymbile/wpl@${{ steps.tag.outputs.latest }} (vendored: ${{ steps.vendored.outputs.version }})."
            exit 1
          fi
      - name: Diff conformance
        run: |
          drifted=0
          for f in $(find priv/conformance -type f \( -name '*.json' -o -name '*.md' \)); do
            rel="${f#priv/conformance/}"
            if ! curl -sSfL "https://raw.githubusercontent.com/gymbile/wpl/${{ steps.tag.outputs.latest }}/conformance/$rel" | diff -q - "$f" > /dev/null 2>&1; then
              echo "::warning::Conformance file drifted: $rel"
              drifted=1
            fi
          done
          [ "$drifted" = 1 ] && exit 1 || exit 0

  vocab-vendored-matches-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read vendored version
        id: vendored
        run: echo "version=$(cat priv/data/matcher-vocab-version.txt)" >> $GITHUB_OUTPUT
      - name: Diff vendored matcher-vocab.json against the upstream release it pins
        run: |
          tag="v${{ steps.vendored.outputs.version }}"
          curl -sSL "https://raw.githubusercontent.com/gymbile/wpl/${tag}/data/matcher-vocab.json" -o /tmp/upstream-vocab.json
          if ! diff -q priv/data/matcher-vocab.json /tmp/upstream-vocab.json > /dev/null; then
            echo "::error::Vendored matcher-vocab.json drifted from gymbile/wpl@${tag} (vendored vocab version: ${{ steps.vendored.outputs.version }}). The vendored copy no longer matches the release it claims to track."
            exit 1
          fi

  vocab-codegen-no-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '26'
      - run: mix deps.get
      # --no-start: the generator is pure file I/O (read JSON, write .ex) and must
      # not boot the OTP app.
      - run: mix run --no-start scripts/gen_matcher_vocab.exs
      - name: Fail if generated vocab drifted
        run: |
          if ! git diff --quiet -- lib/wpl/enforce/matcher_vocab.ex; then
            echo "::error::matcher_vocab.ex is out of date — regenerate and commit."
            git --no-pager diff -- lib/wpl/enforce/matcher_vocab.ex
            exit 1
          fi
