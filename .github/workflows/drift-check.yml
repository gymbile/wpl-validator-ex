name: Schema drift check

on:
  schedule:
    - cron: '0 14 * * 1'
  pull_request:
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve latest gymbile/wpl tag
        id: tag
        run: |
          latest=$(git ls-remote --tags https://github.com/gymbile/wpl.git \
                  | grep 'refs/tags/v' | grep -v '\^{}' \
                  | sed 's|.*refs/tags/||' | sort -V | tail -1)
          echo "latest=$latest" >> $GITHUB_OUTPUT
      - name: Read vendored version
        id: vendored
        run: echo "version=$(cat priv/schema-version.txt)" >> $GITHUB_OUTPUT
      - name: Diff schema
        run: |
          curl -sSL "https://raw.githubusercontent.com/gymbile/wpl/${{ steps.tag.outputs.latest }}/schema/v1.schema.json" -o /tmp/upstream-schema.json
          if ! diff -q priv/schema/v1.schema.json /tmp/upstream-schema.json > /dev/null; then
            echo "::error::Vendored schema drifted from gymbile/wpl@${{ steps.tag.outputs.latest }} (vendored: ${{ steps.vendored.outputs.version }})."
            exit 1
          fi
      - name: Diff conformance
        run: |
          drifted=0
          for f in $(find priv/conformance -type f \( -name '*.json' -o -name '*.md' \)); do
            rel="${f#priv/conformance/}"
            if ! curl -sSfL "https://raw.githubusercontent.com/gymbile/wpl/${{ steps.tag.outputs.latest }}/conformance/$rel" | diff -q - "$f" > /dev/null 2>&1; then
              echo "::warning::Conformance file drifted: $rel"
              drifted=1
            fi
          done
          [ "$drifted" = 1 ] && exit 1 || exit 0

  vocab-vendored-matches-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read vendored versions
        id: vendored
        run: |
          echo "matcher_version=$(cat priv/data/matcher-vocab-version.txt)" >> $GITHUB_OUTPUT
          echo "goal_categories_version=$(cat priv/data/goal-categories-version.txt)" >> $GITHUB_OUTPUT
          echo "dietary_tags_version=$(cat priv/data/dietary-tags-version.txt)" >> $GITHUB_OUTPUT
      - name: Diff vendored matcher-vocab.json against the upstream release it pins
        run: |
          tag="v${{ steps.vendored.outputs.matcher_version }}"
          curl -sSL "https://raw.githubusercontent.com/gymbile/wpl/${tag}/data/matcher-vocab.json" -o /tmp/upstream-vocab.json
          if ! diff -q priv/data/matcher-vocab.json /tmp/upstream-vocab.json > /dev/null; then
            echo "::error::Vendored matcher-vocab.json drifted from gymbile/wpl@${tag} (vendored vocab version: ${{ steps.vendored.outputs.matcher_version }}). The vendored copy no longer matches the release it claims to track."
            exit 1
          fi
      - name: Diff vendored goal-categories.json against the upstream release it pins
        run: |
          tag="v${{ steps.vendored.outputs.goal_categories_version }}"
          curl -sSL "https://raw.githubusercontent.com/gymbile/wpl/${tag}/data/goal-categories.json" -o /tmp/upstream-goal-categories.json
          if ! diff -q priv/data/goal-categories.json /tmp/upstream-goal-categories.json > /dev/null; then
            echo "::error::Vendored goal-categories.json drifted from gymbile/wpl@${tag} (vendored version: ${{ steps.vendored.outputs.goal_categories_version }})."
            exit 1
          fi
      - name: Diff vendored dietary-tags.json against the upstream release it pins
        run: |
          tag="v${{ steps.vendored.outputs.dietary_tags_version }}"
          curl -sSL "https://raw.githubusercontent.com/gymbile/wpl/${tag}/data/dietary-tags.json" -o /tmp/upstream-dietary-tags.json
          if ! diff -q priv/data/dietary-tags.json /tmp/upstream-dietary-tags.json > /dev/null; then
            echo "::error::Vendored dietary-tags.json drifted from gymbile/wpl@${tag} (vendored version: ${{ steps.vendored.outputs.dietary_tags_version }})."
            exit 1
          fi

  vocab-codegen-no-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '26'
      - run: mix deps.get
      - run: mix run scripts/gen_matcher_vocab.exs
      - run: mix run scripts/gen_goal_categories.exs
      - run: mix run scripts/gen_dietary_tags.exs
      - name: Fail if any generated vocab drifted
        run: |
          changed=$(git diff --name-only -- lib/wpl/enforce/matcher_vocab.ex lib/wpl/data/goal_categories.ex lib/wpl/data/dietary_tags.ex)
          if [ -n "$changed" ]; then
            echo "::error::Generated vocab file(s) out of date — regenerate and commit: $changed"
            git --no-pager diff -- lib/wpl/enforce/matcher_vocab.ex lib/wpl/data/goal_categories.ex lib/wpl/data/dietary_tags.ex
            exit 1
          fi
